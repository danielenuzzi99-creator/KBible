<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="js/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="font-sans text-neutral-800">

  <!-- HERO SECTION -->
  <section class="relative h-screen w-full bg-cover bg-center flex flex-col"
    style="background-image: url('images/assets/techniques-bg.png');">

    <!-- NAVBAR -->
    <header class="relative z-10 flex justify-between items-center px-16 py-8">

      <!-- Logo -->
      <div class="flex items-center gap-6">
        <span class="font-serif text-2xl border-2 border-accent px-4 py-2 rounded-full">
          白竜
        </span>
        <span class="font-serif text-3xl tracking-wide">
          CATALOGO SHIRO RYU KARATE
        </span>
      </div>

      <!-- Menu -->
      <nav>
        <ul class="flex gap-10 text-sm tracking-widest font-light">
          <li><a href="./index.html" class="hover:opacity-60 transition">HOME</a></li>
          <li><a href="./techniques.html" class="hover:opacity-60 transition">KATA</a></li>
          <li><a href="./techniques.html" class="hover:opacity-60 transition">TECNICHE</a></li>
          <li><a href="#" class="hover:opacity-60 transition">STORIA</a></li>
          <li><a href="#" class="hover:opacity-60 transition">CHI SIAMO</a></li>
        </ul>
      </nav>

    </header>

    <div x-data="catalogApp" x-init="init()" class="max-w-7xl mx-12 grid grid-cols-12 gap-10 mt-10">

      <!-- SIDEBAR -->
      <aside class="col-span-2 space-y-8">

        <!-- SEARCH -->
        <div>
          <h3 class="font-serif text-lg mb-2">Search</h3>
          <input type="text" x-model="search" placeholder="Search..."
            class="w-full border-b border-neutral-400 bg-transparent outline-none py-2">
        </div>

        <!-- TECHNIQUE CATEGORIES -->
        <div>
          <h3 class="font-serif text-lg mb-3">Technique Categories</h3>

          <template x-for="cat in allCategories" :key="cat.id">
            <label class="flex items-center gap-2 py-1">
              <input type="checkbox" :value="cat.id" x-model="selectedCategories">
              <span x-text="cat.name"></span>
            </label>
          </template>
        </div>

        <!-- KATA -->
        <div>
          <h3 class="font-serif text-lg mb-3">Kata</h3>

          <template x-for="kata in allKatas" :key="kata.id">
            <label class="flex items-center gap-2 py-1">
              <input type="checkbox" :value="kata.id" x-model="selectedKatas">
              <span x-text="kata.name"></span>
            </label>
          </template>
        </div>

      </aside>


      <!-- MAIN CONTENT -->
      <main class="col-span-8 ml-8">

        <!-- TITLE -->
        <div class="text-center mb-10">
          <h1 class="font-serif text-4xl tracking-wide">
            SHIRO RYU KARATE TECHNIQUES
          </h1>

          <p class="text-sm text-neutral-600 mt-2">
            Explore the essence of Shiro Ryu Karate.
          </p>
        </div>


        <!-- TECHNIQUE GRID -->
        <div class="grid grid-cols-2 md:grid-cols-3 gap-8">

          <template x-for="item in filteredItems" :key="item.name">
            <div class="bg-[#f8f4ea] border border-neutral-300 rounded-sm
              p-4 text-center shadow-sm
              hover:shadow-md hover:-translate-y-1
              transition duration-200">

              <!-- Technique Image -->
              <div class="mb-4 flex justify-center">
                <img :src="'images/techniques/' + item.image" loading="lazy" class="h-28 object-contain">
              </div>

              <!-- Technique Name -->
              <h2 class="font-serif text-sm tracking-widest uppercase mb-1" x-text="item.name">
              </h2>

              <!-- Description -->
              <p class="text-xs text-neutral-600 leading-relaxed px-2" x-text="item.description">
              </p>

            </div>
          </template>

        </div>

      </main>


      <!-- DECORATIVE AREA -->
      <div class="col-span-3"></div>

    </div>
</body>

</html>
